<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conference Browser</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="https://cdn.jsdelivr.net/npm/luxon@3.5.0/build/global/luxon.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <div class="bg-glow bg-glow-left" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-right" aria-hidden="true"></div>

  <main class="page">
    <header class="hero">
      <p class="eyebrow">Conference Explorer</p>
      <h1>Security, Privacy, and AI Conferences</h1>
      <p class="subtitle">Loaded from resources/combined_conferences.yaml</p>
    </header>

    <section class="controls" aria-label="Sorting controls">
      <label for="sortBy">Sort by</label>
      <select id="sortBy" name="sortBy">
        <option value="year">Year</option>
        <option value="rank">Rank</option>
        <option value="deadline">Deadline</option>
      </select>

      <label for="sortOrder">Order</label>
      <select id="sortOrder" name="sortOrder">
        <option value="asc">Ascending</option>
        <option value="desc">Descending</option>
      </select>

      <button id="applySort" type="button">Apply Sort</button>
    </section>

    <section class="rank-filter" aria-label="Rank filter">
      <p class="rank-filter-title">Show ranks</p>
      <div id="rankFilters" class="rank-filter-list"></div>
    </section>

    <section class="meta">
      <p id="status">Loading conferences...</p>
    </section>

    <section id="conferenceList" class="conference-grid" aria-live="polite"></section>
  </main>
</body>
</html>
